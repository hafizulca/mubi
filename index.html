<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Movie & Drama</title>
    <style>
        /* Tetapan asas untuk jadikan website nampak moden dan gelap (Dark Mode) */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Elakkan double scrollbar */
        }

        /* Header atas (Boleh letak logo atau nama website anda) */
        header {
            background-color: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            height: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e50914; /* Warna merah ala Netflix */
            text-decoration: none;
        }

        /* Ruang utama untuk paparkan website kisskh */
        .iframe-container {
            width: 100%;
            height: calc(100vh - 70px); /* 100% tinggi skrin tolak tinggi header */
        }

        /* Hilangkan border pada iframe supaya nampak macam site sendiri */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Header Website Anda -->
    <header>
        <div class="logo">MYFLIX</div>
    </header>

    <!-- Bahagian ini akan 'tarik' website sumber -->
    <div class="iframe-container">
        <!-- Tukar pautan src ke mana-mana website yang anda nak -->
        <iframe src="https://kisskh.do/" sandbox="allow-scripts allow-same-origin allow-forms" allowfullscreen></iframe>
    </div>

</body>
</html>
