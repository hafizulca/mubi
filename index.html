<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metime Space</title>
    <style>
        /* Tetapan Asas Tema Premium */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0e; /* Warna latar belakang yang sangat gelap */
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; 
        }

        /* Header Profesional & Moden */
        header {
            background: linear-gradient(90deg, #13131a 0%, #1c1c28 100%);
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            height: 65px;
            border-bottom: 1px solid #2a2a35;
        }

        /* Logo Metime Space */
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            /* Kesan warna gradient pada teks */
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-decoration: none;
        }

        /* Ruang Navigasi untuk isi tempat kosong */
        .ruang-kanan {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .menu-navigasi {
            display: flex;
            gap: 20px;
        }

        .menu-navigasi a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .menu-navigasi a:hover {
            color: #ffffff;
        }

        /* Butang Profil */
        .ikon-profil {
            background: linear-gradient(45deg, #2d3748, #4a5568);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }

        .ikon-profil:hover {
            transform: scale(1.05);
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 65px); 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <!-- Nama Website -->
        <div class="logo">Metime Space</div>
        
        <!-- Elemen untuk elak bahagian kanan nampak kosong -->
        <div class="ruang-kanan">
            <div class="menu-navigasi">
                <a href="#">Utama</a>
                <a href="#">Filem</a>
                <a href="#">Siri TV</a>
            </div>
            <!-- Ikon profil -->
            <div class="ikon-profil">H</div>
        </div>
    </header>

    <div class="iframe-container">
        <!-- Pautan terus tanpa dropdown -->
        <iframe src="https://kisskh.do/" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" allowfullscreen></iframe>
    </div>

</body>
</html>
