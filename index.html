<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metime Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0e;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; 
        }

        header {
            background: linear-gradient(90deg, #13131a 0%, #1c1c28 100%);
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            height: 65px;
            border-bottom: 1px solid #2a2a35;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
        }

        .ruang-kanan {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-navigasi {
            display: flex;
            gap: 20px;
            margin-right: 15px;
        }

        .menu-navigasi a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .menu-navigasi a:hover {
            color: #ffffff;
        }

        select {
            padding: 8px 15px;
            background-color: #1c1c28;
            color: #ffffff;
            border: 1px solid #4facfe;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        select:hover {
            background-color: #2a2a35;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.4);
        }

        select option {
            background-color: #13131a;
            color: white;
        }

        .ikon-profil {
            background: linear-gradient(45deg, #2d3748, #4a5568);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }

        .ikon-profil:hover {
            transform: scale(1.05);
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 65px); 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="keLamanUtama()">Metime Space</div>
        
        <div class="ruang-kanan">
            <div class="menu-navigasi">
                <a onclick="keLamanUtama()">Utama</a>
            </div>

            <select id="pilih-web" onchange="tukarWeb()">
                <option value="https://kisskh.do/">🎬 Filem & Drama</option>
                <option value="https://www.mana2.my/section/live-on-tv">📺 Live TV (Malaysia)</option>
                <option value="https://www.mewatch.sg/live-tv/free-channels">🇸🇬 Live TV (Perlu VPN SG)</option>
                <!-- Link Famelack ditambah kat sini -->
                <option value="https://famelack.com/tv">📺 Famelack TV</option>
            </select>

            <div class="ikon-profil">H</div>
        </div>
    </header>

    <div class="iframe-container">
        <iframe id="paparan-movie" src="https://kisskh.do/" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" allowfullscreen></iframe>
    </div>

    <script>
        function tukarWeb() {
            var linkBaru = document.getElementById("pilih-web").value;
            document.getElementById("paparan-movie").src = linkBaru;
        }

        function keLamanUtama() {
            var linkAsal = "https://kisskh.do/";
            document.getElementById("paparan-movie").src = linkAsal;
            document.getElementById("pilih-web").value = linkAsal;
        }
    </script>

</body>
</html>
