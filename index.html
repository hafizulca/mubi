<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Movie & Drama</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        header {
            background-color: #1a1a1a;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            height: 50px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e50914; 
            text-decoration: none;
        }

        .pilihan-server {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pilihan-server label {
            font-size: 14px;
            color: #cccccc;
        }

        select {
            padding: 8px 12px;
            background-color: #333333;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        select:hover {
            background-color: #444444;
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 70px); 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MYFLIX</div>
        
        <div class="pilihan-server">
            <label for="pilih-web">Sumber:</label>
            <select id="pilih-web" onchange="tukarWeb()">
                <option value="https://kisskh.do/">KissKH (Drama/Movie)</option>
                <option value="https://kissasiantv.com.ro/">KissAsian (Drama)</option>
                <option value="https://dramacool9.com.ro/">Dramacool (Drama)</option>
                <!-- Pautan FMovies ni mungkin kena ganti dengan link Cloudflare Worker nanti -->
                <option value="https://ww4.fmovies.co/home/">FMovies (Global)</option>
            </select>
        </div>
    </header>

    <div class="iframe-container">
        <iframe id="paparan-movie" src="https://kisskh.do/" sandbox="allow-scripts allow-same-origin allow-forms" allowfullscreen></iframe>
    </div>

    <script>
        function tukarWeb() {
            var linkBaru = document.getElementById("pilih-web").value;
            document.getElementById("paparan-movie").src = linkBaru;
        }
    </script>

</body>
</html>
